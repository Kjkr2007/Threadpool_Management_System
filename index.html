<!DOCTYPE html>
<html>
<head>
    <title>Thread Pool Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Thread Pool Management System</h1>

<div class="controls">
    <input type="number" id="taskInput" placeholder="Enter Task ID">
    <button onclick="addTask()">Add Task</button>
</div>

<div class="container">
    <div class="box">
        <h2>Task Queue</h2>
        <ul id="queue"></ul>
    </div>

    <div class="box">
        <h2>Active Threads</h2>
        <ul id="threads"></ul>
    </div>

    <div class="box">
        <h2>Completed Tasks</h2>
        <ul id="completed"></ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
